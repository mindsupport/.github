# ─────────────────────────────────────────────────────────────────────────────
# Reusable PR Review Workflow
#
# PURPOSE
#   This is the canonical org-level reusable workflow.
#   It is defined here for reference and called by ci.yml in this repo.
#
#   IMPORTANT: To share this across ALL mindsupport repos, copy this file
#   to the mindsupport/.github repository:
#
#     mindsupport/.github/.github/workflows/pr-review-reusable.yml
#
#   Individual repos then call it with:
#
#     jobs:
#       review:
#         uses: mindsupport/.github/.github/workflows/pr-review-reusable.yml@main
#         with:
#           node-version: '22'
#           run-build: true
#
#   See docs/org-workflow-setup.md for the full setup guide.
# ─────────────────────────────────────────────────────────────────────────────

name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "22"
      run-build:
        description: "Whether to run the production build step"
        type: boolean
        default: false
      generate-tokens:
        description: "Whether to run the generate-tokens prebuild script"
        type: boolean
        default: false
    secrets:
      NEXT_PUBLIC_SUPABASE_URL:
        required: false
      NEXT_PUBLIC_SUPABASE_ANON_KEY:
        required: false
      SUPABASE_SERVICE_ROLE_KEY:
        required: false
      NEXT_PUBLIC_SITE_URL:
        required: false

jobs:
  review:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate design tokens
        if: ${{ inputs.generate-tokens }}
        run: npm run generate-tokens

      - name: Typecheck
        run: npm run-script --if-present typecheck

      - name: Lint
        run: npm run-script --if-present lint

      - name: Unit tests
        run: npm run-script --if-present test:run

      - name: Build
        if: ${{ inputs.run-build }}
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://placeholder.example.com' }}
